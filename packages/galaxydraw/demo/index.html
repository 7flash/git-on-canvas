<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>galaxydraw — Interactive Demo</title>
    <meta name="description" content="Interactive demo of galaxydraw, a zero-dependency infinite canvas framework for spatial applications.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌌</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #060812; color: #e4e4e7; font-family: 'Inter', sans-serif; overflow: hidden; }
        #app { width: 100vw; height: 100vh; }

        .demo-toolbar {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 12px;
            background: rgba(13, 15, 28, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .demo-toolbar button {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            transition: all 0.15s ease;
        }

        .demo-toolbar button:hover {
            background: rgba(147, 130, 255, 0.15);
            border-color: rgba(147, 130, 255, 0.3);
            color: #fff;
        }

        .demo-toolbar button.active {
            background: rgba(147, 130, 255, 0.2);
            border-color: rgba(147, 130, 255, 0.4);
            color: #fff;
        }

        .demo-toolbar .mode-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            padding: 0 8px;
        }

        /* Responsive toolbar */
        @media (max-width: 640px) {
            .demo-toolbar {
                flex-wrap: wrap;
                max-width: 90vw;
                justify-content: center;
            }
            .demo-toolbar button {
                font-size: 11px;
                padding: 5px 10px;
            }
        }

        /* galaxydraw.css — Base styles for the infinite canvas */

/* ─── Viewport & Canvas ─────────────────────────────────── */
.gd-viewport {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(circle at 50% 50%, #0c0e1a 0%, #060812 100%);
    user-select: none;
    -webkit-user-select: none;
}

.gd-viewport.gd-space-pan {
    cursor: grab;
}

.gd-canvas {
    position: absolute;
    top: 0;
    left: 0;
    transform-origin: 0 0;
    will-change: transform;
}

/* ─── Dot grid background ───────────────────────────────── */
.gd-viewport::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
    z-index: 0;
}

/* ─── Cards ─────────────────────────────────────────────── */
.gd-card {
    position: absolute;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    background: rgba(13, 15, 28, 0.92);
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.03);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: box-shadow 0.2s ease, border-color 0.2s ease;
    contain: layout style;
}

.gd-card--selected {
    border-color: rgba(147, 130, 255, 0.4);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4), 0 0 0 2px rgba(147, 130, 255, 0.25);
}

.gd-card--dragging {
    opacity: 0.9;
    transition: none;
}

.gd-card--resizing {
    transition: none;
}

.gd-card--collapsed .gd-card-body {
    display: none;
}

/* ─── Card header ───────────────────────────────────────── */
.gd-card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    cursor: grab;
    min-height: 40px;
    flex-shrink: 0;
}

.gd-card-header:active {
    cursor: grabbing;
}

.gd-card-header .title {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.9);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    font-family: 'Inter', sans-serif;
}

/* ─── Card body ─────────────────────────────────────────── */
.gd-card-body {
    flex: 1;
    overflow: auto;
    min-height: 0;
}

/* ─── Resize handle ─────────────────────────────────────── */
.gd-resize-handle {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 20px;
    height: 20px;
    cursor: nw-resize;
    z-index: 1;
}

.gd-resize-handle::after {
    content: '';
    position: absolute;
    bottom: 4px;
    right: 4px;
    width: 8px;
    height: 8px;
    border-right: 2px solid rgba(255, 255, 255, 0.15);
    border-bottom: 2px solid rgba(255, 255, 255, 0.15);
    border-radius: 0 0 2px 0;
}

.gd-card:hover .gd-resize-handle::after {
    border-color: rgba(255, 255, 255, 0.3);
}

/* ─── Minimap ───────────────────────────────────────────── */
.gd-minimap {
    position: absolute;
    bottom: 12px;
    right: 12px;
    border-radius: 8px;
    overflow: hidden;
    backdrop-filter: blur(12px);
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.1);
    cursor: pointer;
    z-index: 999;
    transition: opacity 0.2s ease;
}

.gd-minimap:hover {
    opacity: 1;
}

/* ─── Scrollbar styling ─────────────────────────────────── */
.gd-card-body::-webkit-scrollbar {
    width: 4px;
}

.gd-card-body::-webkit-scrollbar-track {
    background: transparent;
}

.gd-card-body::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 2px;
}

.gd-card-body::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.2);
}
    </style>
</head>
