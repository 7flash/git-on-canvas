<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitMaps Stress Test - 1000 Cards</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #e2e8f0; overflow: hidden; }
        #ui { position: fixed; top: 20px; left: 20px; z-index: 1000; background: rgba(30, 41, 59, 0.95); border: 1px solid #334155; border-radius: 12px; padding: 20px; backdrop-filter: blur(8px); }
        h1 { font-size: 16px; margin-bottom: 16px; background: linear-gradient(135deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .controls { display: flex; gap: 8px; margin-bottom: 16px; }
        button { padding: 8px 14px; border-radius: 6px; border: none; font-size: 11px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: linear-gradient(135deg, #7c3aed, #3b82f6); color: white; }
        .btn-secondary { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; }
        .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
        .metric { background: #0f172a; padding: 10px; border-radius: 6px; }
        .metric-label { font-size: 9px; color: #64748b; text-transform: uppercase; }
        .metric-value { font-size: 20px; font-weight: 700; color: #a78bfa; margin-top: 4px; }
        #container, #pixiContainer { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        #pixiContainer { display: none; }
        .status { position: fixed; bottom: 20px; left: 20px; background: #1e293b; padding: 12px 20px; border-radius: 8px; font-size: 12px; color: #94a3b8; border: 1px solid #334155; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; overflow: hidden; }
        .card-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #0f172a; border-bottom: 1px solid #334155; font-size: 11px; font-weight: 600; }
        .card-body { padding: 12px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #94a3b8; }
        .card-line { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.6; }
        .card-line.add { color: #22c55e; background: rgba(34, 197, 94, 0.1); }
        .card-line.del { color: #ef4444; background: rgba(239, 68, 68, 0.1); }
    </style>
    <script src="https://pixijs.download/v7.4.0/pixi.min.js"></script>
</head>
<body>
    <div id="ui">
        <h1>Stress Test - 1000 Cards x 50 Lines</h1>
        <div class="controls">
            <button class="btn-primary" id="domBtn">DOM Test</button>
            <button class="btn-secondary" id="webglBtn">WebGL Test</button>
        </div>
        <div class="metrics">
            <div class="metric"><div class="metric-label">FPS</div><div class="metric-value" id="fpsValue">--</div></div>
            <div class="metric"><div class="metric-label">Cards</div><div class="metric-value" id="cardCount">1000</div></div>
        </div>
        <div style="margin-top:12px;font-size:10px;color:#64748b;">Renderer: <strong id="rendererName" style="color:#60a5fa;">DOM</strong></div>
        <div style="margin-top:10px;font-size:10px;color:#94a3b8;">Total: 50,000+ lines</div>
    </div>
    <div id="container"></div>
    <div id="pixiContainer"></div>
    <div class="status" id="status">Ready</div>

    <script>
        var CODE = 'export async function main() {\n  const config = await loadConfig();\n  const database = await connectDatabase(config.db);\n  const cache = new RedisCache(config.redis);\n  try {\n    const users = await database.query("SELECT * FROM users");\n    for (const user of users) {\n      const profile = await fetchUserProfile(user.id);\n      const settings = await loadUserSettings(user.id);\n      const preferences = await getUserPreferences(user.id);\n      await cache.set("user:" + user.id, { profile, settings, preferences });\n      console.log("Loaded user " + user.id);\n    }\n    return { success: true, count: users.length };\n  } catch (error) {\n    console.error("Failed:", error);\n    throw error;\n  } finally {\n    await database.disconnect();\n  }\n}';
        
        var frameCount = 0, lastFpsUpdate = performance.now(), animationFrame = null, pixiApp = null, pixiCards = [];

        function generateCards(count) {
            var lines = CODE.split('\n');
            var cards = [];
            for (var i = 0; i < count; i++) {
                cards.push({
                    id: i, name: 'file_' + i + '.tsx', color: ['#3178c6', '#61dafb', '#f1e05a'][i % 3],
                    code: lines, changes: { added: [0,5,10], deleted: [2,7] },
                    x: (i % 40) * 450 + 50, y: Math.floor(i / 40) * 900 + 50, width: 430, height: 880
                });
            }
            return cards;
        }

        function createDOMCard(card) {
            var el = document.createElement('div');
            el.className = 'card';
            el.style.cssText = 'position:absolute;left:' + card.x + 'px;top:' + card.y + 'px;width:' + card.width + 'px;height:' + card.height + 'px;';
            var html = card.code.map(function(line, i) {
                var col = '#94a3b8', bg = 'transparent';
                if (card.changes.added.includes(i)) { col = '#22c55e'; bg = 'rgba(34,197,94,0.1)'; }
                else if (card.changes.deleted.includes(i)) { col = '#ef4444'; bg = 'rgba(239,68,68,0.1)'; }
                return '<div class="card-line" style="background:' + bg + ';color:' + col + ';">' + line + '</div>';
            }).join('');
            el.innerHTML = '<div class="card-header"><div style="width:14px;height:14px;border-radius:2px;background:' + card.color + '"></div><span>' + card.name + '</span></div><div class="card-body">' + html + '</div>';
            return el;
        }

        function createPixiCard(card) {
            var container = new PIXI.Container();
            container.x = card.x;
            container.y = card.y;
            
            var bg = new PIXI.Graphics();
            bg.beginFill(0x1e293b);
            bg.lineStyle(1, 0x334155);
            bg.drawRoundedRect(0, 0, card.width, card.height, 8);
            bg.endFill();
            container.addChild(bg);
            
            var header = new PIXI.Graphics();
            header.beginFill(0x0f172a);
            header.drawRect(0, 0, card.width, 32);
            header.endFill();
            container.addChild(header);
            
            var nameText = new PIXI.Text(card.name, { fontFamily: 'Inter', fontSize: 11, fontWeight: '600', fill: 0xe2e8f0 });
            nameText.x = 32;
            nameText.y = 10;
            container.addChild(nameText);
            
            card.code.forEach(function(line, i) {
                var col = 0x94a3b8;
                if (card.changes.added.includes(i)) col = 0x22c55e;
                else if (card.changes.deleted.includes(i)) col = 0xef4444;
                var lineText = new PIXI.Text(line.substring(0, 60), { fontFamily: 'monospace', fontSize: 10, fill: col });
                lineText.x = 12;
                lineText.y = 44 + (i * 16);
                container.addChild(lineText);
            });
            
            return container;
        }

        function runTest(renderer) {
            var count = 1000;
            document.getElementById('cardCount').textContent = count;
            document.getElementById('rendererName').textContent = renderer === 'dom' ? 'DOM' : 'Pixi.js (WebGL)';
            document.getElementById('rendererName').style.color = renderer === 'dom' ? '#60a5fa' : '#a78bfa';
            document.getElementById('container').innerHTML = '';
            
            if (pixiApp) {
                pixiApp.destroy(true);
                pixiApp = null;
            }
            pixiCards = [];
            
            var cards = generateCards(count);
            document.getElementById('status').textContent = 'Creati
