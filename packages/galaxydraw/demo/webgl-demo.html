            background: #1e293b;

            border-radius: 6px;

            padding: 2px 8px;

            font-size: 9px;
            font-weight: 600;

            border: 1px solid #3b82f6;
        }
        .badge-webgl {
            background: rgba(124, 58, 237, 0.2);
            color: #a78bfa;
            border: 1px solid #7c3aed;
        }
    </style>
</head>

  const database = await connectDatabase(config.db);
  const cache = new RedisCache(config.redis);
  try {
    const users = await database.query('SELECT * FROM users');
    for (const user of users) {
      const profile = await fetchUserProfile(user.id);
      const settings = await loadUserSettings(user.id);
      const preferences = await getUserPreferences(user.id);
      await cache.set("user:" + user.id, { profile, settings, preferences });
      console.log("Loaded user " + user.id);
    }
    return { success: true, count: users.length };
  } catch (error) {
    console.error("Failed:", error);
    throw error;
  } finally {
    await database.disconnect();
  }
}`;

            return Array.from({ length: count }, (_, i) => ({

            }));
        }

                return `<div style="color:${color};background:${bg};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'JetBrains Mono',monospace;font-size:10px;line-height:1.6;padding:0 12px;">${line.content}</div>`;

                    <span>${card.name}</span>
                </div>
                <div style="padding:12px;">${codeHTML}</div>
            `;
            
            return el;
        }
