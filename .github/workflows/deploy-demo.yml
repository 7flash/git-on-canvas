name: Deploy galaxydraw demo to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'packages/galaxydraw/demo/**'
      - 'packages/galaxydraw/src/**'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build demo
        working-directory: packages/galaxydraw
        run: bun run demo:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/galaxydraw/demo

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
