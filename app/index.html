<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Git Canvas - Visual Git Repository Explorer with interactive file canvas">
    <title>Git Canvas - Visual Repository Explorer</title>
    <link rel="stylesheet" href="/app/styles/main.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="app">
        <nav class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3" />
                        <circle cx="12" cy="4" r="1.5" />
                        <circle cx="12" cy="20" r="1.5" />
                        <circle cx="4" cy="8" r="1.5" />
                        <circle cx="20" cy="8" r="1.5" />
                        <circle cx="4" cy="16" r="1.5" />
                        <circle cx="20" cy="16" r="1.5" />
                        <path d="M12 7v2M12 15v2M8.5 9.5l-2.5-1M15.5 9.5l2.5-1M8.5 14.5l-2.5 1M15.5 14.5l2.5 1" />
                    </svg>
                    <span>Git Canvas</span>
                </div>
            </div>

            <div class="repo-selector">
                <label>Repository Path</label>
                <div class="input-group">
                    <input type="text" id="repoPath" placeholder="C:\path\to\repo" />
                    <button id="browseRepo" class="btn-icon" title="Paste path from clipboard">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
                            <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2" />
                        </svg>
                    </button>
                    <button id="browseFolder" class="btn-icon" title="Browse for folder">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z" />
                        </svg>
                    </button>
                    <button id="loadRepo" class="btn-icon" title="Load Repository">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M21 12a9 9 0 11-9-9" />
                            <path d="M21 3v6h-6" />
                        </svg>
                    </button>
                </div>
                <!-- Hidden file input for browser folder picker -->
                <input type="file" id="folderPickerInput" webkitdirectory directory multiple style="display:none" />
            </div>

            <div class="commit-timeline" id="commitTimeline">
                <div class="section-header">
                    <h3>Commits</h3>
                    <span class="badge" id="commitCount">0</span>
                </div>
                <div class="timeline-container" id="timelineContainer">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor"
                            stroke-width="1.5" opacity="0.4">
                            <circle cx="12" cy="12" r="10" />
                            <path d="M12 6v6l4 2" />
                        </svg>
                        <p>Load a repository to see commits</p>
                    </div>
                </div>
            </div>

            <div class="canvas-controls">
                <h3>Canvas</h3>
                <div class="control-row">
                    <button id="resetView" class="btn-secondary">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                            <path d="M3 3v5h5" />
                        </svg>
                        Reset View
                    </button>
                    <button id="fitAll" class="btn-secondary">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" />
                        </svg>
                        Fit All
                    </button>
                </div>
                <div class="zoom-control">
                    <label>Zoom</label>
                    <input type="range" id="zoomSlider" min="0.1" max="3" step="0.1" value="1" />
                    <span id="zoomValue">100%</span>
                </div>

                <div class="hotkey-legend">
                    <h4>Shortcuts</h4>
                    <div class="hotkey-row"><kbd>Scroll</kbd> <span>Zoom canvas</span></div>
                    <div class="hotkey-row"><kbd>Drag</kbd> <span>Pan / Move card</span></div>
                    <div class="hotkey-row"><kbd>Shift+Click</kbd> <span>Multi-select</span></div>
                    <div class="hotkey-row"><kbd>Delete</kbd> <span>Hide selected files</span></div>
                    <div class="hotkey-row"><kbd>Esc</kbd> <span>Cancel / Close</span></div>
                    <div class="hotkey-row"><kbd>Corner drag</kbd> <span>Resize card</span></div>
                </div>
            </div>
        </nav>

        <main class="canvas-area">
            <div class="canvas-header">
                <div class="view-mode-toggle">
                    <button id="modeCommits" class="mode-btn active" title="View commit diffs">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <path d="M12 6v6l4 2" />
                        </svg>
                        Commits
                    </button>
                    <button id="modeAllFiles" class="mode-btn" title="View all files in working tree">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                            <line x1="16" y1="13" x2="8" y2="13" />
                            <line x1="16" y1="17" x2="8" y2="17" />
                        </svg>
                        All Files
                    </button>
                </div>

                <div class="current-commit" id="currentCommitInfo">
                    <span class="commit-hash">No commit selected</span>
                </div>

                <div class="header-actions">
                    <div class="file-count">
                        <span id="fileCount">0</span> files
                    </div>
                    <button id="showHidden" class="btn-secondary btn-sm" title="Show hidden files"
                        style="display:none;">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94" />
                            <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19" />
                            <line x1="1" y1="1" x2="23" y2="23" />
                        </svg>
                        <span id="hiddenCount">0</span> hidden
                    </button>
                </div>
            </div>

            <div class="canvas-viewport" id="canvasViewport">
                <div class="canvas" id="canvas">
                    <div class="canvas-grid"></div>
                </div>
            </div>

            <div class="minimap" id="minimap">
                <div class="minimap-viewport" id="minimapViewport"></div>
            </div>
        </main>
    </div>

    <div class="file-preview-modal" id="filePreviewModal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <span class="file-path" id="previewFilePath"></span>
                <button class="modal-close" id="closePreview">&times;</button>
            </div>
            <pre class="modal-body"><code id="previewContent"></code></pre>
        </div>
    </div>

    <script type="module" src="/app/main.js"></script>
</body>

</html>
