        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-primary: #7c3aed;

            line-height: 1.6;
            overflow-x: hidden;
        }
        .gradient-bg {
            position: fixed;
            inset: 0;
            background:

            pointer-events: none;
            z-index: -1;
        }
        .container {
            max-width: 1200px;

            justify-content: space-between;

            font-weight: 700;

            -webkit-text-fill-color: transparent;
        }
        .logo svg {
            width: 32px;
            height: 32px;
        }
        .nav-links {
            display: flex;
            gap: 32px;
        }
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: var(--text-primary);
        }
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--accent-glow);
        }
        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--bg-tertiary);
        }
        .btn-secondary:hover {
            background: var(--bg-tertiary);
        }
        /* Hero */
        .hero {
            padding: 120px 0;
            text-align: center;
        }
        .hero h1 {
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }
        .hero p {
            font-size: 20px;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 40px;
        }
        .hero-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 60px;

        .hero-image {
            background: var(--bg-secondary);
            border: 1px solid var(--bg-tertiary);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 1000px;
            margin: 0 auto;
        }
        .hero-image img {
            width: 100%;
            height: auto;
            display: block;
        }
        /* Features */
        .features {
            padding: 120px 0;

        .section-header {

        }

            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));

        }
        .feature-card {
            background: var(--bg-secondary);
            border: 1px solid var(--bg-tertiary);
            border-radius: 12px;
            padding: 32px;
            transition: all 0.3s;
        }
        .feature-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-primary);
            box-shadow: 0 12px 36px rgba(124, 58, 237, 0.2);
        }
        .feature-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 12px;

            font-size: 24px;

        }
        .feature-card h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .feature-card p {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.6;
        }
        /* Stats */
        .stats {
            padding: 80px 0;
            background: var(--bg-secondary);
            border-top: 1px solid var(--bg-tertiary);
            border-bottom: 1px solid var(--bg-tertiary);
        }

            gap: 40px;
            text-align: center;
        }
        .stat-item h3 {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .stat-item p {
            color: var(--text-muted);
            font-size: 16px;
        }

        .cta {
            padding: 120px 0;
            text-align: center;
        }
        .cta-box {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.1), rgba(59, 130, 246, 0.1));
            border: 1px solid var(--accent-primary);
            border-radius: 24px;
            padding: 80px 40px;
            max-width: 800px;
            margin: 0 auto;
        }
        .cta h2 {
            font-size: 40px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .cta p {
            font-size: 18px;
            color: var(--text-muted);
            margin-bottom: 32px;
        }
